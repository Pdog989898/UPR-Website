<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Product Detail - UPR Home Systems</title>
  <link rel="stylesheet" href="css/product-detail.css">
  <link rel="stylesheet" href="css/components.css">
</head>
<body>

  <!-- SMALL HEADER WITH BACK BUTTON -->
  <header class="small-header">
    <div class="small-header-content">
      <button onclick="history.back()">← Back</button>
    </div>
  </header>

  <!-- MAIN CONTENT -->
  <main class="main product-detail-container">
    <div class="product-detail-image">
      <img src="assets/images/no-image-1.webp" alt="Kodi Box">
    </div>
    <div class="product-detail-info">
      <h1>SD Card</h1>
      <p class="price">$25 Includs Tax</p>
      <p class="description">
        This is a Kodi Box description. You can replace it with actual product details later.
      </p>
       <div class="card-footer">
         <button class="add-cart-btn" data-product="SD Card">
           <span class="cart-icon">
             <svg viewBox="0 0 24 24" fill="white" xmlns="http://www.w3.org/2000/svg" width="16" height="16" aria-hidden="true"><path d="M7 18c-1.1 0-1.99.9-1.99 2S5.9 22 7 22s2-.9 2-2-.9-2-2-2zm10 0c-1.1 0-1.99.9-1.99 2S15.9 22 17 22s2-.9 2-2-.9-2-2-2zM7.16 14l.84-2h7.45c.75 0 1.42-.41 1.75-1.03L21 6H6.21l-.94-2H1v2h2l3.6 7.59-1.35 2.44C5.08 16.37 5 16.68 5 17c0 1.1.9 2 2 2h12v-2H7.42c-.14 0-.25-.11-.25-.25l.03-.12L7.16 14z"/></svg>
           </span>
           Add to Cart
         </button>
       </div>
    </div>
  </main>

  <script src="js/script.js" defer></script>
</body>
</html>
